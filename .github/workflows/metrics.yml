name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          config_timezone: Africa/Cairo
          config_twemoji: yes
          config_display: large
          base: header, activity, community, repositories, metadata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_analysis: bytecode
          plugin_languages_categories: programming, markup
          plugin_languages_colors: github
          plugin_languages_limit: 10
          plugin_languages_recent_categories: programming
          plugin_languages_recent_days: 30
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit, pull_request, issue
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_repositories: yes
          plugin_repositories_featured: Mostafa-Galal-sudo/SmartCarApp,Mostafa-Galal-sudo/cybernetic-canvas
          plugin_lines: yes
          plugin_traffic: yes
          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_sample: 10
